name: Deploy Marp slide to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Build HTML and PDF using Marp Setup
        run: |
          npm install -g @marp-team/marp-cli
          
          # Generate Mermaid diagram (with puppeteer config for GitHub Actions environment)
          echo '{"args":["--no-sandbox"]}' > puppeteer-config.json
          npx -y @mermaid-js/mermaid-cli -i images/src/architecture.mmd -o images/architecture.png -b transparent -s 3 -p puppeteer-config.json
          
          # Copy images to build dir so they are available
          mkdir -p build/images
          cp -r images/* build/images/ || true
          
          # Combine divided markdown files into one for build
          # Use 00_intro.md as base, then append others without their frontmatters
          cat presentation/00_intro.md > presentation/combined.md
          for f in presentation/01_*.md presentation/02_*.md presentation/03_*.md presentation/04_*.md presentation/05_*.md presentation/06_*.md; do
            # Ensure previous content ends with a newline
            printf '\n' >> presentation/combined.md
            echo "---" >> presentation/combined.md
            # Delete lines from 1st to the next --- (stripping frontmatter)
            sed '1,/---/d' "$f" >> presentation/combined.md
          done
          
          # Build HTML
          marp presentation/combined.md \
            --theme presentation/mamezou-theme.css \
            --html \
            --allow-local-files \
            -o build/index.html
          
          # Fix image paths: ../images/ -> ./images/ for GitHub Pages
          sed -i 's|\.\./images/|./images/|g' build/index.html
          
          # HTMLにのみショートカット用スクリプトを安全に注入
          cat << 'EOF' >> build/index.html
          <script>
          document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            const keyMap = { '1': '第1部', '2': '第2部', '3': '第3部', 'm': 'まとめ', 'e': 'エピローグ', 's': 'プロローグ' };
            if (e.key === '0' || e.key === 'Home') { window.location.hash = '#1'; return; }
            if (keyMap[e.key]) {
              const targetText = keyMap[e.key];
              const sections = document.querySelectorAll('section');
              for (let i = 0; i < sections.length; i++) {
                const h2s = sections[i].querySelectorAll('h2');
                let found = false;
                for (const h of h2s) { if (h.textContent.includes(targetText)) { found = true; break; } }
                if (found) {
                  const targetHash = sections[i].id ? '#' + sections[i].id : '#' + (i + 1);
                  window.location.hash = targetHash;
                  break;
                }
              }
            }
          });
          </script>
          EOF
          
          # Build PDF
          marp presentation/combined.md \
            --theme presentation/mamezou-theme.css \
            --allow-local-files \
            --pdf \
            -o build/slide.pdf

          # Copy timer app to build dir
          cp -r timer build/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
